server {
    listen 80;
    server_name myfinancesxls.tech www.myfinancesxls.tech;
    return 301 https://$host$request_uri; # Redireciona tudo para HTTPS
}

server {
    listen 443 ssl;
    server_name myfinancesxls.tech www.myfinancesxls.tech;

    ssl_certificate /etc/letsencrypt/live/myfinancesxls.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myfinancesxls.tech/privkey.pem;

    location / {
        proxy_pass http://web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

   location /api/ {
        proxy_pass http://api:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme; # ESSENCIAL PARA HTTPS
    }
}